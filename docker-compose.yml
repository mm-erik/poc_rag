services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-poc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console (web UI)
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-poc-backend
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: rag_poc
      VECTOR_SIZE: 1024
      CHUNK_SIZE: 500
      CHUNK_OVERLAP: 80
      CORS_ALLOW_ORIGINS: "*"
      MISTRAL_EMBED_MODEL: mistral-embed
    depends_on:
      - qdrant
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-poc-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep container's installed modules, ignore host's

  # ---------- public tunnels (PoC only) ----------
  # URLs are printed to the container logs; retrieve them with:
  #   docker compose logs tunnel-qdrant
  #   docker compose logs tunnel-minio
  tunnel-qdrant:
    image: cloudflare/cloudflared:latest
    container_name: rag-poc-tunnel-qdrant
    command: tunnel --no-autoupdate --url http://qdrant:6333
    depends_on:
      - qdrant
    restart: unless-stopped

  tunnel-minio:
    image: cloudflare/cloudflared:latest
    container_name: rag-poc-tunnel-minio
    command: tunnel --no-autoupdate --url http://minio:9000
    depends_on:
      - minio
    restart: unless-stopped

volumes:
  qdrant_storage:
  minio_data: